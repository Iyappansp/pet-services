<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — PawCare Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="auth-page">
  <div class="hero-bg-shape hero-shape-1" style="opacity:.3;"></div>
  <div class="hero-bg-shape hero-shape-2" style="opacity:.25;"></div>

  <div class="auth-card animate-scale-in" id="resetCard">
    <div style="text-align:center;margin-bottom:28px;">
      <a href="index.html" class="nav-logo" style="display:inline-flex;justify-content:center;margin-bottom:16px;">
        <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="color:#fff;"><path d="M12 14a3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3 3 3 0 0 1-3 3m0-12a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1-3-3M5 16a3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3 3 3 0 0 1-3 3m14 0a3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3 3 3 0 0 1-3 3z"/></svg></div>
        <div class="logo-text">
          <span class="logo-name">Paw<span>Care</span> Pro</span>
          <span class="logo-tagline">Trusted Pet Services</span>
        </div>
      </a>
      <div style="width:64px;height:64px;background:rgba(76,175,80,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 16px;"></div>
      <h3 style="font-family:var(--font-heading);font-weight:800;margin-bottom:4px;">Forgot Password?</h3>
      <p style="font-size:.875rem;color:var(--text-secondary);">No worries! Enter your email and we'll send you a reset link.</p>
    </div>

    <form onsubmit="sendReset(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="resetEmail" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-bottom:16px;">Send Reset Link </button>
      <a href="login.html" class="btn btn-ghost" style="width:100%;text-align:center;display:block;">← Back to Login</a>
    </form>

    <!-- Info -->
    <div style="background:rgba(76,175,80,.07);border:1px solid rgba(76,175,80,.2);border-radius:var(--radius);padding:14px 16px;margin-top:20px;font-size:.82rem;color:var(--text-secondary);display:flex;gap:10px;align-items:flex-start;">
      <span style="flex-shrink:0;color:var(--primary);display:inline-flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></span>
      The reset link expires in 30 minutes. Check your spam folder if you don't see it in your inbox within 2 minutes.
    </div>

    <div style="display:flex;justify-content:center;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
      <button class="nav-icon-btn" id="themeToggle" title="Toggle theme"><span id="themeIcon"></span></button>
      <button class="nav-icon-btn" id="rtlToggle" title="Toggle RTL"><span id="rtlIcon">⇄</span></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
<script>
function sendReset(e) {
  e.preventDefault();
  const email = document.getElementById('resetEmail').value;
  document.getElementById('resetCard').innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="width:72px;height:72px;background:rgba(76,175,80,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px;"></div>
      <h3 style="font-family:var(--font-heading);font-weight:800;color:var(--primary);margin-bottom:10px;">Check Your Email!</h3>
      <p style="color:var(--text-secondary);margin-bottom:6px;">We sent a password reset link to:</p>
      <strong style="color:var(--text-primary);">${email}</strong>
      <p style="color:var(--text-secondary);font-size:.85rem;margin-top:16px;margin-bottom:24px;">The link expires in 30 minutes.</p>
      <a href="login.html" class="btn btn-primary" style="width:100%;justify-content:center;">Back to Login</a>
      <button onclick="location.reload()" class="btn btn-ghost" style="width:100%;margin-top:10px;justify-content:center;">Resend Email</button>
    </div>`;
}
</script>
</body>
</html>
